<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post Discussion - Campus Intelligence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Campus discussion details in an installable mobile-ready web app.">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Campus Intelligence">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="/pwa/icon.svg">
  <link rel="apple-touch-icon" href="/pwa/apple-touch-icon.png">
  <link rel="stylesheet" href="/pwa/pwa.css">
  <script src="/pwa/pwa-register.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", sans-serif; }
    body { background: #f5f7fb; color: #101828; }
    #navbar {
      position: fixed; top: 0; width: 100%; height: 72px; z-index: 1000;
      background: rgba(10, 16, 30, 0.94); color: white; display: flex;
      justify-content: space-between; align-items: center; padding: 0 34px;
    }
    #navbar nav { display: flex; gap: 18px; flex-wrap: wrap; }
    #navbar nav a { color: white; text-decoration: none; font-size: 14px; }
    .hero {
      margin-top: 72px; padding: 72px 24px 44px; color: white; text-align: center;
      background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 55%, #0f766e 100%);
    }
    .hero h1 { font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 10px; }
    .hero p { opacity: 0.92; line-height: 1.7; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .card {
      background: white; border-radius: 20px; padding: 24px; border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.08); margin-bottom: 18px;
    }
    .badges, .reply-header, .meta-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 700; }
    .cat { background: #eef2ff; color: #3730a3; }
    .normal { background: #eaecf0; color: #344054; }
    .important { background: #fef0c7; color: #b54708; }
    .urgent { background: #fee4e2; color: #b42318; }
    .resolved { background: #dcfae6; color: #067647; }
    .meta-row { color: #667085; font-size: 13px; margin-top: 12px; line-height: 1.6; }
    .post-body, .reply-body { color: #344054; line-height: 1.8; margin-top: 16px; white-space: pre-line; }
    .reply-list { display: grid; gap: 14px; }
    .reply-card {
      background: #f8fafc; border-radius: 18px; padding: 18px; border: 1px solid #e4e7ec;
    }
    .reply-card.accepted { border-color: #86efac; background: #f0fdf4; }
    textarea {
      width: 100%; min-height: 120px; resize: vertical; padding: 12px;
      border-radius: 12px; border: 1px solid #d0d5dd; font-size: 14px;
    }
    button, .action-link {
      display: inline-flex; align-items: center; justify-content: center; border: none;
      border-radius: 12px; padding: 10px 14px; cursor: pointer; text-decoration: none;
      font-size: 13px; font-weight: 700;
    }
    .primary { background: #1d4ed8; color: white; }
    .secondary { background: #eef2ff; color: #3730a3; }
    .status-line { margin-top: 10px; min-height: 18px; color: #667085; font-size: 13px; }
    .empty { text-align: center; padding: 24px; color: #667085; }
    @media (max-width: 720px) {
      #navbar { height: auto; padding: 16px 20px; align-items: flex-start; gap: 10px; }
      .hero { margin-top: 86px; padding: 56px 20px 40px; }
      .wrap { padding: 20px; }
    }
  </style>
</head>
<body>
  <header id="navbar">
    <div><strong>Campus Intelligence</strong></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="resources.html">Resources</a>
      <a href="community.html">Community</a>
      <a href="noticeboard.html">Noticeboard</a>
      <a href="profile.html">Profile</a>
      <a href="admin.html" id="adminLink" style="display:none;">Admin</a>
      <a href="login.html" id="loginLink">Login</a>
      <a href="#" id="logoutLink" style="display:none;">Logout</a>
    </nav>
  </header>

  <section class="hero">
    <h1 id="pageTitle">Loading discussion...</h1>
    <p id="pageSubtitle">Fetching post details and replies.</p>
  </section>

  <main class="wrap">
    <a href="community.html" class="action-link secondary" style="margin-bottom:16px;">Back to Community</a>

    <section class="card" id="postCard">
      <div class="empty">Loading post details...</div>
    </section>

    <section class="card">
      <h2 style="margin-bottom:12px;">Add Reply</h2>
      <textarea id="replyText" placeholder="Share a helpful reply, clarification, or answer."></textarea>
      <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="primary" id="submitReplyBtn" onclick="submitReply()">Post Reply</button>
      </div>
      <div class="status-line" id="replyStatus"></div>
    </section>

    <section class="card">
      <h2 style="margin-bottom:12px;">Replies</h2>
      <div class="reply-list" id="replyList">
        <div class="empty">Loading replies...</div>
      </div>
    </section>
  </main>

  <script src="/app-assets/session.js"></script>
  <script>
    let currentUser = null;
    let currentPost = null;

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value || '';
      return div.innerHTML;
    }

    function formatDateTime(value) {
      if (!value) return '';
      const normalized = String(value).includes(' ') ? String(value).replace(' ', 'T') : String(value);
      const d = new Date(normalized);
      return isNaN(d.getTime()) ? String(value) : d.toLocaleString();
    }

    function setReplyStatus(message, isError = false) {
      const node = document.getElementById('replyStatus');
      node.style.color = isError ? '#b42318' : '#667085';
      node.textContent = message || '';
    }

    function getPostId() {
      return new URLSearchParams(window.location.search).get('id');
    }

    function canAcceptReplies() {
      if (!currentUser || !currentPost) return false;
      return currentUser.role === 'admin' || String(currentUser.id) === String(currentPost.user_id);
    }

    async function loadPost() {
      const id = getPostId();
      if (!id) throw new Error('No post id was provided.');

      const response = await fetch(`/api/posts/${id}`, { credentials: 'include' });
      const payload = await response.json();
      if (!response.ok || !payload.success) {
        throw new Error(payload.message || 'Could not load the post.');
      }

      currentPost = payload.data;
      document.getElementById('pageTitle').textContent = currentPost.title;
      document.getElementById('pageSubtitle').textContent = currentPost.type === 'query'
        ? 'Discussion thread with accepted answers and peer support.'
        : 'Time-bound update thread with context and replies.';

      const resolvedBadge = currentPost.status === 'resolved' || Number(currentPost.accepted_reply_count || 0) > 0
        ? '<span class="badge resolved">RESOLVED</span>'
        : '';
      const expiresLine = currentPost.expires_at
        ? `<div>Expires: ${escapeHtml(formatDateTime(currentPost.expires_at))}</div>`
        : '';

      document.getElementById('postCard').innerHTML = `
        <div class="badges">
          <span class="badge cat">${escapeHtml(currentPost.category || 'General')}</span>
          <span class="badge ${escapeHtml(currentPost.priority || 'normal')}">${escapeHtml((currentPost.priority || 'normal').toUpperCase())}</span>
          ${resolvedBadge}
        </div>
        <div class="meta-row">
          <div>Author: <strong>${escapeHtml(currentPost.author_name || 'User')}</strong></div>
          <div>Created: ${escapeHtml(formatDateTime(currentPost.created_at))}</div>
          <div>Views: ${currentPost.view_count || 0}</div>
          ${expiresLine}
        </div>
        <div class="post-body">${escapeHtml(currentPost.body || '')}</div>
      `;
    }

    async function loadReplies() {
      const id = getPostId();
      const response = await fetch(`/api/posts/${id}/replies`, { credentials: 'include' });
      const payload = await response.json();
      if (!response.ok || !payload.success) {
        throw new Error(payload.message || 'Could not load replies.');
      }

      const replies = payload.data || [];
      const canAccept = canAcceptReplies();
      const list = document.getElementById('replyList');
      if (!replies.length) {
        list.innerHTML = '<div class="empty">No replies yet. Be the first to help.</div>';
        return;
      }

      list.innerHTML = replies.map((reply) => {
        const accepted = Number(reply.is_accepted) === 1;
        const acceptButton = canAccept && !accepted
          ? `<button class="primary" onclick="acceptReply(${reply.id})">Mark as Accepted</button>`
          : '';
        return `
          <article class="reply-card ${accepted ? 'accepted' : ''}">
            <div class="reply-header">
              <strong>${escapeHtml(reply.author_name || 'User')}</strong>
              <span>${escapeHtml(formatDateTime(reply.created_at))}</span>
              ${accepted ? '<span class="badge resolved">ACCEPTED ANSWER</span>' : ''}
            </div>
            <div class="reply-body">${escapeHtml(reply.reply_text || '')}</div>
            ${acceptButton ? `<div style="margin-top:14px;">${acceptButton}</div>` : ''}
          </article>
        `;
      }).join('');
    }

    async function submitReply() {
      const text = document.getElementById('replyText').value.trim();
      if (!text) {
        setReplyStatus('Reply text is required.', true);
        return;
      }

      const submitButton = document.getElementById('submitReplyBtn');
      if (submitButton) submitButton.disabled = true;
      setReplyStatus('Posting reply...');
      try {
        const response = await fetch(`/api/posts/${getPostId()}/replies`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ reply_text: text })
        });
        const payload = await response.json();
        if (!response.ok || !payload.success) {
          setReplyStatus(payload.message || 'Could not post reply.', true);
          return;
        }

        document.getElementById('replyText').value = '';
        setReplyStatus('Reply posted.');
        await Promise.all([loadPost(), loadReplies()]);
      } finally {
        if (submitButton) submitButton.disabled = false;
      }
    }

    async function acceptReply(replyId) {
      const response = await fetch(`/api/posts/${getPostId()}/replies/${replyId}/accept`, {
        method: 'PUT',
        credentials: 'include'
      });
      const payload = await response.json();
      if (!response.ok || !payload.success) {
        setReplyStatus(payload.message || 'Could not accept reply.', true);
        return;
      }

      setReplyStatus('Accepted answer updated.');
      await Promise.all([loadPost(), loadReplies()]);
    }

    (async function init() {
      try {
        currentUser = await window.CampusSession.requireUser();
        if (!currentUser) return;
        await loadPost();
        await loadReplies();
      } catch (err) {
        document.getElementById('postCard').innerHTML = `<div class="empty">${escapeHtml(err.message || 'Could not load this discussion.')}</div>`;
        document.getElementById('replyList').innerHTML = '<div class="empty">Replies are unavailable for this post.</div>';
      }
    })();
  </script>
</body>
</html>
