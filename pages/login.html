<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Campus Intelligence System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to Campus Intelligence on mobile or desktop.">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Campus Intelligence">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="/pwa/icon.svg">
  <link rel="apple-touch-icon" href="/pwa/apple-touch-icon.png">
  <link rel="stylesheet" href="/pwa/pwa.css">
  <script src="/pwa/pwa-register.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", sans-serif; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 28%),
                  linear-gradient(135deg, #0f172a 0%, #1d4ed8 54%, #0f766e 100%);
      padding: 24px;
    }
    .login-box {
      width: 100%; max-width: 440px; background: rgba(255,255,255,0.97); border-radius: 24px;
      padding: 36px; box-shadow: 0 24px 72px rgba(15, 23, 42, 0.24);
    }
    .login-box h1 { font-size: 2rem; margin-bottom: 10px; }
    .login-box p { color: #475467; line-height: 1.6; margin-bottom: 24px; }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid #d0d5dd; border-radius: 12px; overflow: hidden; margin-bottom: 22px; }
    .tabs button { border: none; padding: 12px; cursor: pointer; font-weight: 600; background: #f8fafc; }
    .tabs button.active { background: #1d4ed8; color: white; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; margin-bottom: 7px; color: #344054; }
    .form-group input {
      width: 100%; padding: 14px 15px; border-radius: 12px; border: 1px solid #d0d5dd; font-size: 15px;
    }
    .form-group input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12); }
    .submit-btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px; cursor: pointer;
      background: linear-gradient(135deg, #1d4ed8 0%, #0f766e 100%); color: white; font-size: 15px; font-weight: 700;
    }
    .hint { font-size: 12px; color: #667085; line-height: 1.6; margin-top: 10px; }
    .status { margin-bottom: 16px; min-height: 20px; font-size: 13px; color: #b42318; }
    .footer-link { margin-top: 20px; text-align: center; font-size: 13px; }
    .footer-link a { color: #1d4ed8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Campus Login</h1>
    <p>Use your VIT student account to sign in. The session is locked to the browser that authenticated, so copied browser state will not keep working elsewhere.</p>

    <div class="tabs">
      <button type="button" id="loginTab" class="active" onclick="showTab('login')">Login</button>
      <button type="button" id="registerTab" onclick="showTab('register')">Register</button>
    </div>

    <div class="status" id="statusMessage"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">College Email</label>
        <input type="email" id="email" placeholder="firstname.lastname2024@vitstudent.ac.in" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="submit-btn">Login</button>
    </form>

    <form id="registerForm" onsubmit="handleRegister(event)" style="display:none;">
      <div class="form-group">
        <label for="regName">Full Name</label>
        <input type="text" id="regName" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label for="regEmail">VIT Student Email</label>
        <input type="email" id="regEmail" placeholder="firstname.lastname2024@vitstudent.ac.in" required>
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" placeholder="Create a password" required>
      </div>
      <div class="form-group">
        <label for="regPassword2">Confirm Password</label>
        <input type="password" id="regPassword2" placeholder="Re-enter password" required>
      </div>
      <button type="submit" class="submit-btn">Create Account</button>
      <div class="hint">Only VIT student emails ending with 20XX@vitstudent.ac.in are accepted.</div>
    </form>

    <div class="footer-link"><a href="index.html">Return to Home</a></div>
  </div>

  <script src="/app-assets/session.js"></script>
  <script>
    function getPostLoginRedirect() {
      const next = new URLSearchParams(window.location.search).get('next');
      if (next && next.startsWith('/') && !next.startsWith('//')) {
        return next;
      }

      return 'index.html';
    }

    function showStatus(message, isError = true) {
      const status = document.getElementById('statusMessage');
      status.style.color = isError ? '#b42318' : '#067647';
      status.textContent = message || '';
    }

    function showTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const loginTab = document.getElementById('loginTab');
      const registerTab = document.getElementById('registerTab');

      const onLogin = tab === 'login';
      loginForm.style.display = onLogin ? 'block' : 'none';
      registerForm.style.display = onLogin ? 'none' : 'block';
      loginTab.classList.toggle('active', onLogin);
      registerTab.classList.toggle('active', !onLogin);
      showStatus('');
    }

    function isValidVitEmail(email) {
      if (!email) return false;
      const lower = email.trim().toLowerCase();
      if (!lower.endsWith('@vitstudent.ac.in')) return false;
      return /20\d{2}$/.test(lower.split('@')[0]);
    }

    async function handleLogin(event) {
      event.preventDefault();
      showStatus('');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
        const payload = await response.json();

        if (!response.ok || !payload.success) {
          showStatus(payload.message || 'Login failed.');
          return;
        }

        window.CampusSession.storeUser(payload.user);
        window.location.href = getPostLoginRedirect();
      } catch (err) {
        showStatus('Network error. Please check whether the server is running.');
      }
    }

    async function handleRegister(event) {
      event.preventDefault();
      showStatus('');

      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regPassword2').value;

      if (!isValidVitEmail(email)) {
        showStatus('Use your VIT student email ending with 20XX@vitstudent.ac.in.');
        return;
      }
      if (password.length < 6) {
        showStatus('Password should be at least 6 characters.');
        return;
      }
      if (password !== confirmPassword) {
        showStatus('Passwords do not match.');
        return;
      }

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ name, email, password })
        });
        const payload = await response.json();

        if (!response.ok || !payload.success) {
          showStatus(payload.message || 'Registration failed.');
          return;
        }

        window.CampusSession.storeUser(payload.user);
        showStatus('Account created successfully.', false);
        window.location.href = getPostLoginRedirect();
      } catch (err) {
        showStatus('Network error. Please check whether the server is running.');
      }
    }

    window.CampusSession.fetchCurrentUser().then((user) => {
      if (user) {
        window.location.href = getPostLoginRedirect();
      }
    });
  </script>
</body>
</html>
